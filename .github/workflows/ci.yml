name: Check PR

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1 — Type check, lint, format, commit messages
  # Runs on every PR and every push to main
  # ─────────────────────────────────────────────────────────────
  run-ci:
    name: Run Type Check & Linters
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm config
        shell: bash
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Install dependencies
        run: pnpm install

      - name: Check types
        run: pnpm typecheck

      - name: Check Prettier
        run: pnpm format:ci

      - name: Check linting
        run: pnpm lint

      - name: Check commit messages
        uses: wagoid/commitlint-github-action@v6

  # ─────────────────────────────────────────────────────────────
  # Job 2 — Build & deploy docs to GitHub Pages
  # Only runs on push to main (i.e. after a PR merges)
  # Depends on CI passing first
  # ─────────────────────────────────────────────────────────────
  deploy-docs:
    name: Deploy Docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: run-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload docs as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the static docs folder at the repo root
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
